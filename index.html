<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f0f0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="일정관리">
<link rel="manifest" href="manifest.json">
<title>일정 관리</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c28;
    --surface3: #252535;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #f0eff8;
    --text2: #9493b0;
    --text3: #5a5975;
    --accent: #7c6ff7;
    --accent2: #a89cf8;
    --accent-dim: rgba(124,111,247,0.15);
    --green: #4eca8b;
    --green-dim: rgba(78,202,139,0.12);
    --red: #f76f6f;
    --amber: #f7bc6f;
    --blue: #6fb8f7;
    --pink: #f76fb8;
    --radius: 12px;
    --radius-lg: 18px;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,111,247,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,111,247,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Glow */
  body::after {
    content: '';
    position: fixed;
    top: -30%;
    right: -10%;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(124,111,247,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; display: flex; flex-direction: column; min-height: 100vh; }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.25rem 2rem;
    border-bottom: 1px solid var(--border);
    background: rgba(10,10,15,0.85);
    backdrop-filter: blur(20px);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 34px;
    height: 34px;
    background: var(--accent-dim);
    border: 1px solid rgba(124,111,247,0.3);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }

  .logo-text {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  .logo-text span { color: var(--accent2); }

  .header-actions { display: flex; align-items: center; gap: 10px; }

  .sync-status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text2);
    padding: 5px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 100px;
  }

  .sync-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--green);
  }

  .sync-dot.syncing {
    animation: pulse 1.2s ease-in-out infinite;
    background: var(--amber);
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .btn {
    padding: 8px 16px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    font-family: inherit;
    transition: all 0.15s;
  }

  .btn-primary {
    background: var(--accent);
    color: #fff;
  }

  .btn-primary:hover { background: var(--accent2); transform: translateY(-1px); }

  .btn-ghost {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border2);
  }

  .btn-ghost:hover { background: var(--surface3); }

  .btn-icon {
    width: 36px;
    height: 36px;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    color: var(--text2);
    transition: all 0.15s;
  }

  .btn-icon:hover { background: var(--surface3); color: var(--text); }

  /* Auth screen */
  #auth-screen {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  .auth-card {
    max-width: 420px;
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: var(--radius-lg);
    padding: 3rem 2.5rem;
    text-align: center;
  }

  .auth-icon {
    width: 72px;
    height: 72px;
    background: var(--accent-dim);
    border: 1px solid rgba(124,111,247,0.25);
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    margin: 0 auto 1.5rem;
  }

  .auth-card h2 { font-size: 24px; font-weight: 700; margin-bottom: 0.5rem; }
  .auth-card p { color: var(--text2); font-size: 14px; line-height: 1.6; margin-bottom: 2rem; }

  .btn-google {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 12px;
    background: #fff;
    color: #3c4043;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-google:hover { background: #f8f9fa; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }

  .google-icon {
    width: 20px;
    height: 20px;
  }

  .setup-notice {
    margin-top: 1.5rem;
    padding: 1rem;
    background: rgba(247,188,111,0.08);
    border: 1px solid rgba(247,188,111,0.2);
    border-radius: 10px;
    font-size: 12px;
    color: var(--amber);
    text-align: left;
    line-height: 1.6;
  }

  /* Main app */
  #main-app { display: none; flex: 1; flex-direction: column; }

  /* Layout */
  .app-layout {
    display: grid;
    grid-template-columns: 280px 1fr;
    flex: 1;
    overflow: hidden;
  }

  /* Sidebar */
  .sidebar {
    border-right: 1px solid var(--border);
    padding: 1.5rem 1rem;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }

  /* Mini calendar */
  .mini-cal { }

  .mini-cal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.75rem;
    padding: 0 4px;
  }

  .mini-cal-title { font-size: 14px; font-weight: 600; }

  .mini-cal-nav { display: flex; gap: 4px; }

  .mini-cal-nav button {
    background: none;
    border: none;
    color: var(--text2);
    cursor: pointer;
    width: 24px;
    height: 24px;
    border-radius: 6px;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.1s;
  }

  .mini-cal-nav button:hover { background: var(--surface2); color: var(--text); }

  .mini-cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
  }

  .mini-cal-dow {
    text-align: center;
    font-size: 11px;
    color: var(--text3);
    padding: 4px 0;
    font-weight: 500;
  }

  .mini-cal-day {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    border-radius: 8px;
    cursor: pointer;
    color: var(--text2);
    transition: all 0.1s;
    position: relative;
  }

  .mini-cal-day:hover { background: var(--surface2); color: var(--text); }

  .mini-cal-day.today {
    background: var(--accent-dim);
    color: var(--accent2);
    font-weight: 700;
  }

  .mini-cal-day.selected {
    background: var(--accent);
    color: #fff;
    font-weight: 700;
  }

  .mini-cal-day.has-events::after {
    content: '';
    position: absolute;
    bottom: 3px;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--accent2);
  }

  .mini-cal-day.has-events.today::after,
  .mini-cal-day.has-events.selected::after { background: rgba(255,255,255,0.7); }

  .mini-cal-day.other-month { color: var(--text3); }

  /* Sidebar section */
  .sidebar-section { }

  .sidebar-section-title {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text3);
    margin-bottom: 0.5rem;
    padding: 0 4px;
  }

  /* Upcoming */
  .upcoming-list { display: flex; flex-direction: column; gap: 6px; }

  .upcoming-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.15s;
  }

  .upcoming-item:hover { background: var(--surface2); border-color: var(--border2); }

  .upcoming-color { width: 3px; height: 36px; border-radius: 2px; flex-shrink: 0; margin-top: 2px; }

  .upcoming-info { flex: 1; min-width: 0; }

  .upcoming-title {
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 2px;
  }

  .upcoming-time { font-size: 11px; color: var(--text2); }

  .upcoming-countdown {
    font-size: 11px;
    font-weight: 600;
    color: var(--accent2);
    white-space: nowrap;
  }

  .upcoming-countdown.soon { color: var(--red); }

  /* Add event button */
  .add-event-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    padding: 10px 12px;
    background: var(--accent-dim);
    border: 1px dashed rgba(124,111,247,0.3);
    border-radius: var(--radius);
    color: var(--accent2);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }

  .add-event-btn:hover { background: rgba(124,111,247,0.2); border-color: var(--accent); }

  /* Main content */
  .main-content { overflow-y: auto; padding: 1.5rem 2rem; }

  /* View switcher */
  .view-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
  }

  .view-title { font-size: 22px; font-weight: 700; }

  .view-tabs {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 3px;
    gap: 2px;
  }

  .view-tab {
    padding: 6px 16px;
    border-radius: 9px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--text2);
    font-family: inherit;
    transition: all 0.15s;
  }

  .view-tab.active { background: var(--surface3); color: var(--text); }

  /* Week view */
  .week-grid {
    display: grid;
    grid-template-columns: 60px repeat(7, 1fr);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }

  .week-header {
    display: contents;
  }

  .week-header-time {
    background: var(--surface);
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 8px 4px;
  }

  .week-header-day {
    background: var(--surface);
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 10px 8px;
    text-align: center;
    font-size: 12px;
  }

  .week-header-day:last-child { border-right: none; }

  .week-header-day .day-num {
    font-size: 20px;
    font-weight: 700;
    line-height: 1.2;
    margin-bottom: 2px;
  }

  .week-header-day .day-name { color: var(--text2); font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; }

  .week-header-day.today .day-num { color: var(--accent2); }

  .week-header-day.today {
    background: var(--accent-dim);
    border-bottom-color: rgba(124,111,247,0.2);
  }

  .week-body { display: contents; }

  .time-label {
    border-right: 1px solid var(--border);
    padding: 0 6px;
    height: 56px;
    display: flex;
    align-items: flex-start;
    justify-content: flex-end;
    font-size: 10px;
    color: var(--text3);
    padding-top: 4px;
    background: var(--surface);
  }

  .day-col {
    border-right: 1px solid var(--border);
    position: relative;
    height: 56px;
  }

  .day-col:last-child { border-right: none; }

  .day-col.today { background: rgba(124,111,247,0.02); }

  .hour-line {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: var(--border);
  }

  .event-block {
    position: absolute;
    left: 2px;
    right: 2px;
    border-radius: 6px;
    padding: 3px 6px;
    font-size: 11px;
    font-weight: 600;
    overflow: hidden;
    cursor: pointer;
    z-index: 10;
    transition: all 0.15s;
  }

  .event-block:hover { transform: scale(1.02); z-index: 20; }

  .event-block .ev-time { font-weight: 400; opacity: 0.8; font-size: 10px; }

  /* Now line */
  .now-line {
    position: absolute;
    left: 0;
    right: 0;
    height: 2px;
    background: var(--red);
    z-index: 15;
  }

  .now-line::before {
    content: '';
    position: absolute;
    left: -4px;
    top: -4px;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--red);
  }

  /* Day view event list */
  .day-events { display: flex; flex-direction: column; gap: 8px; }

  .day-event-card {
    display: flex;
    align-items: stretch;
    gap: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    transition: all 0.15s;
  }

  .day-event-card:hover { background: var(--surface2); border-color: var(--border2); }

  .day-event-color { width: 4px; flex-shrink: 0; }

  .day-event-body { flex: 1; padding: 12px 14px; }

  .day-event-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }

  .day-event-meta {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 12px;
    color: var(--text2);
  }

  .day-event-badges { display: flex; gap: 6px; margin-top: 8px; }

  .badge {
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 100px;
  }

  /* Notification panel */
  .notif-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: rgba(124,111,247,0.08);
    border-bottom: 1px solid rgba(124,111,247,0.15);
  }

  .notif-bar-icon { font-size: 18px; }

  .notif-bar-text { flex: 1; font-size: 13px; }

  .notif-bar-text strong { color: var(--accent2); }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    z-index: 1000;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: var(--radius-lg);
    padding: 2rem;
    width: 100%;
    max-width: 480px;
    animation: slideUp 0.2s ease;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
  }

  .modal-title { font-size: 18px; font-weight: 700; }

  .modal-close {
    background: none;
    border: none;
    color: var(--text2);
    font-size: 22px;
    cursor: pointer;
    line-height: 1;
    padding: 0;
  }

  .modal-close:hover { color: var(--text); }

  .form-group { margin-bottom: 1.25rem; }

  .form-label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }

  .form-input {
    width: 100%;
    padding: 10px 14px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 10px;
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
  }

  .form-input:focus { border-color: var(--accent); }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .color-picker { display: flex; gap: 8px; flex-wrap: wrap; }

  .color-swatch {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: all 0.1s;
  }

  .color-swatch.selected { border-color: #fff; transform: scale(1.1); }

  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 1.5rem; }

  /* Toast */
  .toast-container {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .toast {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: var(--surface3);
    border: 1px solid var(--border2);
    border-radius: 12px;
    font-size: 13px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    animation: slideRight 0.3s ease;
    min-width: 240px;
  }

  @keyframes slideRight {
    from { opacity: 0; transform: translateX(100px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .toast-icon { font-size: 18px; }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--text2);
  }

  .empty-state-icon { font-size: 48px; margin-bottom: 1rem; opacity: 0.4; }
  .empty-state h3 { font-size: 16px; font-weight: 600; margin-bottom: 0.5rem; color: var(--text); }
  .empty-state p { font-size: 13px; line-height: 1.6; }

  /* Responsive */
  @media (max-width: 768px) {
    .app-layout { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    header { padding: 1rem; }
    .main-content { padding: 1rem; }
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }

  /* Config panel */
  .config-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.25rem;
    margin-bottom: 1rem;
  }

  .config-title {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text3);
    margin-bottom: 0.75rem;
  }

  .config-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 0;
  }

  .config-row label { font-size: 13px; color: var(--text2); }

  .toggle {
    width: 40px;
    height: 22px;
    background: var(--surface3);
    border-radius: 11px;
    position: relative;
    cursor: pointer;
    transition: background 0.2s;
  }

  .toggle.on { background: var(--accent); }

  .toggle::after {
    content: '';
    position: absolute;
    top: 3px;
    left: 3px;
    width: 16px;
    height: 16px;
    background: #fff;
    border-radius: 50%;
    transition: transform 0.2s;
  }

  .toggle.on::after { transform: translateX(18px); }
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <header>
    <div class="logo">
      <div class="logo-icon">📅</div>
      <div class="logo-text">일정<span>관리</span></div>
    </div>
    <div class="header-actions">
      <div class="sync-status" id="syncStatus">
        <div class="sync-dot" id="syncDot"></div>
        <span id="syncText">연결 대기</span>
      </div>
      <button class="btn-icon" onclick="openSettings()" title="설정">⚙️</button>
      <button class="btn btn-primary" onclick="openAddEvent()" id="addBtn" style="display:none">+ 일정 추가</button>
      <button class="btn btn-ghost" onclick="logout()" id="logoutBtn" style="display:none">로그아웃</button>
    </div>
  </header>

  <!-- Notification bar -->
  <div class="notif-bar" id="notifBar" style="display:none">
    <div class="notif-bar-icon">🔔</div>
    <div class="notif-bar-text">

// ========== GOOGLE CALENDAR API ==========
async function fetchGoogleEvents() {
  if (DEMO_MODE || !isAuthenticated) return;

  setSyncStatus('syncing');
  try {
    const token = localStorage.getItem('gToken');
    if (!token) return;

    const now = new Date();
    const min = new Date(now.getFullYear(), now.getMonth() - 1, 1).toISOString();
    const max = new Date(now.getFullYear(), now.getMonth() + 3, 0).toISOString();

    const res = await fetch(
      `https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${min}&timeMax=${max}&singleEvents=true&orderBy=startTime&key=${API_KEY}`,
      { headers: { Authorization: `Bearer ${token}` } }
    );
    const data = await res.json();

    events = data.items.map(item => ({
      id: item.id,
      title: item.summary || '(제목 없음)',
      start: item.start.dateTime ? new Date(item.start.dateTime) : new Date(item.start.date),
      end: item.end.dateTime ? new Date(item.end.dateTime) : new Date(item.end.date),
      allDay: !item.start.dateTime,
      location: item.location || '',
      desc: item.description || '',
      color: '#7c6ff7'
    }));

    setSyncStatus('synced');
    renderAll();
    scheduleAllNotifications();
  } catch (e) {
    setSyncStatus('error');
    console.error(e);
  }
}

async function addEventToGoogle(ev) {
  if (DEMO_MODE || !isAuthenticated) return null;

  const token = localStorage.getItem('gToken');
  const body = {
    summary: ev.title,
    location: ev.location,
    description: ev.desc,
    start: ev.allDay ? { date: formatDate(ev.start) } : { dateTime: ev.start.toISOString() },
    end: ev.allDay ? { date: formatDate(ev.end) } : { dateTime: ev.end.toISOString() },
  };

  const res = await fetch(
    `https://www.googleapis.com/calendar/v3/calendars/primary/events?key=${API_KEY}`,
    {
      method: 'POST',
      headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    }
  );
  return await res.json();
}

// ========== SYNC ==========
function startAutoSync() {
  fetchGoogleEvents();
  syncInterval = setInterval(fetchGoogleEvents, 60000); // every 60s
  setSyncStatus('synced');
}

function syncNow() {
  if (DEMO_MODE) {
    setSyncStatus('syncing');
    setTimeout(() => {
      setSyncStatus('synced');
      toast('✓ 동기화 완료', 'success');
    }, 1200);
    return;
  }
  fetchGoogleEvents();
}

function setSyncStatus(status) {
  const dot = document.getElementById('syncDot');
  const text = document.getElementById('syncText');
  dot.className = 'sync-dot';
  if (status === 'syncing') {
    dot.classList.add('syncing');
    text.textContent = '동기화 중...';
  } else if (status === 'synced') {
    dot.style.background = 'var(--green)';
    text.textContent = '동기화됨';
  } else if (status === 'error') {
    dot.style.background = 'var(--red)';
    text.textContent = '오류';
  } else {
    dot.style.background = 'var(--text3)';
    text.textContent = '연결 대기';
  }
}

// ========== NOTIFICATIONS ==========
function requestNotification() {
  if (!('Notification' in window)) {
    document.getElementById('notifBar').style.display = 'none';
    return;
  }
  if (Notification.permission === 'default') {
    document.getElementById('notifBar').style.display = 'flex';
  } else {
    document.getElementById('notifBar').style.display = 'none';
    if (Notification.permission === 'granted') scheduleAllNotifications();
  }
}

async function requestNotification() {
  if (!('Notification' in window)) return;
  const perm = await Notification.requestPermission();
  document.getElementById('notifBar').style.display = 'none';
  if (perm === 'granted') {
    scheduleAllNotifications();
    toast('🔔 알림이 활성화되었습니다', 'success');
  }
}

function scheduleAllNotifications() {
  if (Notification.permission !== 'granted') return;
  scheduledNotifs.forEach(t => clearTimeout(t));
  scheduledNotifs.clear();

  const now = Date.now();
  const intervals = Object.entries(notifSettings)
    .filter(([,v]) => v)
    .map(([k]) => parseInt(k));

  events.forEach(ev => {
    if (ev.allDay) return;
    intervals.forEach(mins => {
      const triggerTime = ev.start.getTime() - mins * 60000;
      const delay = triggerTime - now;
      if (delay > 0 && delay < 24 * 3600000) {
        const t = setTimeout(() => {
          sendNotification(ev, mins);
        }, delay);
        scheduledNotifs.set(`${ev.id}-${mins}`, t);
      }
    });
  });
}

function sendNotification(ev, minsLeft) {
  if (Notification.permission !== 'granted') return;
  const notif = new Notification(`📅 ${ev.title}`, {
    body: `${minsLeft}분 후 시작${ev.location ? ' · ' + ev.location : ''}`,
    icon: 'icon-192.png',
    badge: 'icon-72.png',
    tag: ev.id,
    vibrate: [200, 100, 200],
    requireInteraction: minsLeft <= 10,
  });
  notif.onclick = () => { window.focus(); };
}

function toggleNotif(el) {
  el.classList.toggle('on');
  const map = { notif10: 10, notif30: 30, notif60: 60 };
  const mins = map[el.id];
  notifSettings[mins] = el.classList.contains('on');
  scheduleAllNotifications();
}

// ========== RENDER ==========
function renderAll() {
  renderMiniCal();

}

// Mini calendar
function renderMiniCal() {
  const y = miniCalDate.getFullYear(), m = miniCalDate.getMonth();
  const title = `${y}년 ${m+1}월`;
  document.getElementById('miniCalTitle').textContent = title;

  const grid = document.getElementById('miniCalGrid');
  grid.innerHTML = '';

  ['일','월','화','수','목','금','토'].forEach(d => {
    const el = document.createElement('div');
    el.className = 'mini-cal-dow';
    el.textContent = d;
    grid.appendChild(el);
  });

  const first = new Date(y, m, 1).getDay();
  const days = new Date(y, m+1, 0).getDate();
  const today = new Date();
  const eventDays = new Set(events.map(e => formatDate(e.start)));

  for (let i = 0; i < first; i++) {
    const prev = new Date(y, m, -first+i+1);
    const el = document.createElement('div');
    el.className = 'mini-cal-day other-month';
    el.textContent = prev.getDate();
    grid.appendChild(el);
  }

  for (let d = 1; d <= days; d++) {
    const date = new Date(y, m, d);
    const el = document.createElement('div');
    el.className = 'mini-cal-day';
    el.textContent = d;

    if (formatDate(date) === formatDate(today)) el.classList.add('today');
    if (formatDate(date) === formatDate(selectedDate)) el.classList.add('selected');
    if (eventDays.has(formatDate(date))) el.classList.add('has-events');

    el.onclick = () => {
      selectedDate = date;
      if (currentView === 'week') { currentDate = date; }
      renderAll();
    };
    grid.appendChild(el);
  }
}

function miniCalNav(dir) {
  miniCalDate = new Date(miniCalDate.getFullYear(), miniCalDate.getMonth() + dir, 1);
  renderMiniCal();
}

// Upcoming events (next 48hrs)
function renderUpcoming() {
  const list = document.getElementById('upcomingList');
  const now = new Date();
  const cutoff = new Date(now.getTime() + 48 * 3600000);

  const upcoming = events
    .filter(e => !e.allDay && e.start > now && e.start < cutoff)
    .sort((a,b) => a.start - b.start)
    .slice(0, 5);

  if (!upcoming.length) {
    list.innerHTML = '<div style="font-size:12px; color:var(--text3); padding:8px 4px;">향후 48시간 내 일정 없음</div>';
    return;
  }

  list.innerHTML = upcoming.map(ev => {
    const diff = ev.start - now;
    const h = Math.floor(diff / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const countdown = h > 0 ? `${h}시간 ${m}분 후` : `${m}분 후`;
    const soon = diff < 30 * 60000;

    return `<div class="upcoming-item" onclick="selectEvent('${ev.id}')">
      <div class="upcoming-color" style="background:${ev.color}"></div>
      <div class="upcoming-info">
        <div class="upcoming-title">${ev.title}</div>
        <div class="upcoming-time">${formatTime(ev.start)}</div>
      </div>
      <div class="upcoming-countdown ${soon ? 'soon' : ''}">${countdown}</div>
    </div>`;
  }).join('');
}

// Main view
function renderMainView() {
  const view = document.getElementById('calendarView');

  if (currentView === 'week') {

    view.innerHTML = renderWeekView(startOfWeek);
    drawNowLine();
  } else if (currentView === 'day') {
    title.textContent = `${currentDate.getFullYear()}년 ${currentDate.getMonth()+1}월 ${currentDate.getDate()}일`;
    view.innerHTML = renderDayView(currentDate);
  } else {
    title.textContent = '전체 일정 목록';
    view.innerHTML = renderListView();
  }
}

function renderWeekView(weekStart) {
  const days = [];
  const today = new Date();
  for (let i = 0; i < 7; i++) {
    const d = new Date(weekStart);
    d.setDate(d.getDate() + i);
    days.push(d);
  }

  const dows = ['일','월','화','수','목','금','토'];
  let html = `<div class="week-grid">
    <div class="week-header-time"></div>
    ${days.map(d => `<div class="week-header-day ${formatDate(d) === formatDate(today) ? 'today' : ''}">
      <div class="day-num">${d.getDate()}</div>
      <div class="day-name">${dows[d.getDay()]}</div>
    </div>`).join('')}`;

  for (let h = 0; h < 24; h++) {
    const label = h === 0 ? '' : `${h}:00`;
    html += `<div class="time-label">${label}</div>`;
    days.forEach((d, di) => {
      const dayEvents = events.filter(e => {
        if (e.allDay) return false;
        return formatDate(e.start) === formatDate(d) &&
          e.start.getHours() === h;
      });
      const isToday = formatDate(d) === formatDate(today);
      html += `<div class="day-col ${isToday ? 'today' : ''}" id="col-${di}-${h}">
        <div class="hour-line"></div>
        ${dayEvents.map(ev => {
          const startMin = ev.start.getMinutes();
          const durH = (ev.end - ev.start) / 3600000;
          const top = (startMin / 60) * 56;
          const height = Math.max(24, durH * 56 - 2);
          return `<div class="event-block" style="background:${ev.color}22; border-left:3px solid ${ev.color}; top:${top}px; height:${height}px; color:${ev.color}" onclick="editEvent('${ev.id}')">
            <div>${ev.title}</div>
            <div class="ev-time">${formatTime(ev.start)}</div>
          </div>`;
        }).join('')}
      </div>`;
    });
  }

  html += '</div>';
  return html;
}

function drawNowLine() {
  const now = new Date();
  const h = now.getHours();
  const m = now.getMinutes();
  const top = (m / 60) * 56;
  const today = new Date();
  const weekStart = getWeekStart(currentDate);
  let di = Math.round((today - weekStart) / 86400000);
  if (di < 0 || di > 6) return;

  const col = document.getElementById(`col-${di}-${h}`);
  if (!col) return;
  const line = document.createElement('div');
  line.className = 'now-line';
  line.style.top = top + 'px';
  col.appendChild(line);
}

function renderDayView(date) {
  const dayEvents = events.filter(e => formatDate(e.start) === formatDate(date))
    .sort((a,b) => a.start - b.start);

  if (!dayEvents.length) {
    return `<div class="empty-state">
      <div class="empty-state-icon">📭</div>
      <h3>일정이 없습니다</h3>
      <p>이 날에는 등록된 일정이 없습니다.<br>새 일정을 추가해보세요!</p>
    </div>`;
  }

  return `<div class="day-events">${dayEvents.map(ev => `
    <div class="day-event-card" onclick="editEvent('${ev.id}')">
      <div class="day-event-color" style="background:${ev.color}"></div>
      <div class="day-event-body">
        <div class="day-event-title">${ev.title}</div>
        <div class="day-event-meta">
          <span>${ev.allDay ? '하루 종일' : formatTime(ev.start) + ' – ' + formatTime(ev.end)}</span>
          ${ev.location ? `<span>📍 ${ev.location}</span>` : ''}
        </div>
        ${ev.desc ? `<div style="font-size:12px; color:var(--text2); margin-top:6px;">${ev.desc}</div>` : ''}
        <div class="day-event-badges">
          <span class="badge" style="background:${ev.color}22; color:${ev.color}">
            ${ev.allDay ? '하루 종일' : Math.round((ev.end-ev.start)/60000) + '분'}
          </span>
        </div>
      </div>
    </div>`).join('')}
  </div>`;
}

function renderListView() {
  const sorted = [...events].sort((a,b) => a.start - b.start);
  if (!sorted.length) {
    return `<div class="empty-state"><div class="empty-state-icon">📋</div><h3>일정이 없습니다</h3><p>아직 등록된 일정이 없습니다.</p></div>`;
  }

  let byDate = {};
  sorted.forEach(ev => {
    const key = formatDate(ev.start);
    if (!byDate[key]) byDate[key] = [];
    byDate[key].push(ev);
  });

  return Object.entries(byDate).map(([date, evs]) => {
    const d = new Date(date);
    const dows = ['일','월','화','수','목','금','토'];
    const isToday = date === formatDate(new Date());
    return `<div style="margin-bottom:1.5rem;">
      <div style="font-size:13px; font-weight:700; color:${isToday ? 'var(--accent2)' : 'var(--text2)'}; margin-bottom:0.75rem; padding-bottom:0.5rem; border-bottom:1px solid var(--border);">
        ${isToday ? '오늘 · ' : ''}${d.getMonth()+1}월 ${d.getDate()}일 (${dows[d.getDay()]})
      </div>
      <div class="day-events">${evs.map(ev => `
        <div class="day-event-card" onclick="editEvent('${ev.id}')">
          <div class="day-event-color" style="background:${ev.color}"></div>
          <div class="day-event-body">
            <div class="day-event-title">${ev.title}</div>
            <div class="day-event-meta">
              <span>${ev.allDay ? '하루 종일' : formatTime(ev.start) + ' – ' + formatTime(ev.end)}</span>
              ${ev.location ? `<span>📍 ${ev.location}</span>` : ''}
            </div>
          </div>
        </div>`).join('')}
      </div>
    </div>`;
  }).join('');
}

// ========== NAVIGATION ==========
function setView(v, btn) {
  currentView = v;
  document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderMainView();
}

function navDate(dir) {
  if (currentView === 'week') {
    currentDate.setDate(currentDate.getDate() + dir * 7);
  } else {
    currentDate.setDate(currentDate.getDate() + dir);
  }
  selectedDate = new Date(currentDate);
  renderAll();
}

function goToday() {
  currentDate = new Date();
  selectedDate = new Date();
  miniCalDate = new Date();
  renderAll();
}

// ========== ADD/EDIT EVENTS ==========
function openAddEvent() {
  editingEventId = null;
  document.getElementById('modalTitle').textContent = '새 일정 추가';
  document.getElementById('evTitle').value = '';
  document.getElementById('evDate').value = formatDate(selectedDate);
  document.getElementById('evStart').value = '09:00';
  document.getElementById('evEnd').value = '10:00';
  document.getElementById('evLocation').value = '';
  document.getElementById('evDesc').value = '';
  document.getElementById('evAllDay').value = 'false';
  selectedColor = COLORS[0].hex;
  renderColorPicker();
  document.getElementById('eventModal').classList.add('open');
}

function editEvent(id) {
  const ev = events.find(e => e.id === id);
  if (!ev) return;
  editingEventId = id;
  document.getElementById('modalTitle').textContent = '일정 수정';
  document.getElementById('evTitle').value = ev.title;
  document.getElementById('evDate').value = formatDate(ev.start);
  document.getElementById('evStart').value = ev.allDay ? '09:00' : `${pad(ev.start.getHours())}:${pad(ev.start.getMinutes())}`;
  document.getElementById('evEnd').value = ev.allDay ? '10:00' : `${pad(ev.end.getHours())}:${pad(ev.end.getMinutes())}`;
  document.getElementById('evLocation').value = ev.location;
  document.getElementById('evDesc').value = ev.desc;
  document.getElementById('evAllDay').value = ev.allDay ? 'true' : 'false';
  selectedColor = ev.color;
  renderColorPicker();
  document.getElementById('eventModal').classList.add('open');
}

function selectEvent(id) {
  editEvent(id);
}

function closeModal() {
  document.getElementById('eventModal').classList.remove('open');
}

function renderColorPicker() {
  document.getElementById('colorPicker').innerHTML = COLORS.map(c =>
    `<div class="color-swatch ${c.hex === selectedColor ? 'selected' : ''}"
      style="background:${c.hex}" title="${c.name}"
      onclick="selectColor('${c.hex}')"></div>`
  ).join('');
}

function selectColor(hex) {
  selectedColor = hex;
  renderColorPicker();
}

async function saveEvent() {
  const title = document.getElementById('evTitle').value.trim();
  if (!title) { toast('제목을 입력해주세요', 'error'); return; }

  const dateStr = document.getElementById('evDate').value;
  const startStr = document.getElementById('evStart').value;
  const endStr = document.getElementById('evEnd').value;
  const allDay = document.getElementById('evAllDay').value === 'true';

  const start = allDay ? new Date(dateStr) : new Date(`${dateStr}T${startStr}`);
  const end = allDay ? new Date(dateStr) : new Date(`${dateStr}T${endStr}`);

  const ev = {
    id: editingEventId || 'local-' + Date.now(),
    title,
    start,
    end,
    allDay,
    location: document.getElementById('evLocation').value,
    desc: document.getElementById('evDesc').value,
    color: selectedColor
  };

  if (editingEventId) {
    const idx = events.findIndex(e => e.id === editingEventId);
    if (idx >= 0) events[idx] = ev;
  } else {
    events.push(ev);
    if (!DEMO_MODE) {
      const result = await addEventToGoogle(ev);
      if (result && result.id) ev.id = result.id;
    }
  }

  closeModal();
  scheduleAllNotifications();
  renderAll();
  toast(editingEventId ? '✓ 일정이 수정되었습니다' : '✓ 일정이 추가되었습니다', 'success');
}

// ========== UTILS ==========
function formatDate(d) {
  if (!d) return '';
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}

function formatTime(d) {
  return `${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function pad(n) { return n.toString().padStart(2, '0'); }

function getWeekStart(d) {
  const date = new Date(d);
  const day = date.getDay();
  date.setDate(date.getDate() - day);
  date.setHours(0,0,0,0);
  return date;
}

function toast(msg, type = 'info') {
  const icons = { success: '✅', error: '❌', info: 'ℹ️', warning: '⚠️' };
  const el = document.createElement('div');
  el.className = 'toast';
  el.innerHTML = `<span class="toast-icon">${icons[type]}</span><span>${msg}</span>`;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

function openSettings() {
  toast('설정은 사이드바에서 변경할 수 있습니다', 'info');
}

// ========== INIT ==========
// Check for OAuth callback token
const hash = window.location.hash;
if (hash.includes('access_token')) {
  const params = new URLSearchParams(hash.substring(1));
  const token = params.get('access_token');
  localStorage.setItem('gToken', token);
  window.location.hash = '';
  isAuthenticated = true;
  showApp();
}

// Check for notification permission
if ('Notification' in window && Notification.permission === 'default') {
  document.getElementById('notifBar').style.display = 'flex';
}

// PWA Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

// Auto-update upcoming every minute
setInterval(() => {
  if (isAuthenticated) renderUpcoming();
}, 60000);
</script>
